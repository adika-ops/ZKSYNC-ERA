<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZKSync Era Wallet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0e1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
        }

        .bg-glow:nth-child(1) {
            background: linear-gradient(135deg, #4c6ef5, #845ef7);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .bg-glow:nth-child(2) {
            background: linear-gradient(135deg, #339af0, #22b8cf);
            bottom: -10%;
            right: -10%;
            animation-delay: -4s;
            animation-duration: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        .wallet-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 520px;
            position: relative;
            z-index: 1;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            font-size: 13px;
            color: #8b95a5;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            margin: 24px 0;
        }

        .address-section {
            margin-bottom: 28px;
        }

        .section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #5a6270;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .address-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: border-color 0.3s ease;
        }

        .address-box:hover {
            border-color: rgba(76, 110, 245, 0.3);
        }

        .wallet-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #4c6ef5, #845ef7);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .wallet-icon svg {
            width: 24px;
            height: 24px;
            color: white;
        }

        .address-details {
            flex: 1;
            min-width: 0;
        }

        .address-label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .address-value {
            font-size: 14px;
            color: #e5e7eb;
            font-family: 'SF Mono', 'Fira Code', monospace;
            letter-spacing: 0.5px;
            word-break: break-all;
            line-height: 1.5;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            color: #9ca3af;
            transition: all 0.2s ease;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .copy-btn:hover {
            background: rgba(76, 110, 245, 0.15);
            border-color: rgba(76, 110, 245, 0.3);
            color: #4c6ef5;
        }

        .copy-btn.copied {
            background: rgba(34, 197, 94, 0.15);
            border-color: rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        .copy-btn svg {
            width: 18px;
            height: 18px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 10px 18px;
            border-radius: 100px;
            font-size: 13px;
            color: #22c55e;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: #4b5563;
        }

        .footer a {
            color: #4c6ef5;
            text-decoration: none;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(76, 110, 245, 0.4);
            border-radius: 50%;
            animation: particleFloat 15s infinite linear;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
        }

        .network-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .network-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .network-dot {
            width: 10px;
            height: 10px;
            background: linear-gradient(135deg, #4c6ef5, #845ef7);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(76, 110, 245, 0.5);
        }

        .network-name {
            font-size: 14px;
            color: #d1d5db;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow"></div>
    
    <div class="particles" id="particles"></div>

    <div class="wallet-card">
        <div class="header">
            <div class="logo-container">
                <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="40" height="40" rx="12" fill="url(#zksync-gradient)"/>
                    <path d="M28 20L16 28V12L28 20Z" fill="white" fill-opacity="0.95"/>
                    <defs>
                        <linearGradient id="zksync-gradient" x1="0" y1="0" x2="40" y2="40">
                            <stop stop-color="#4c6ef5"/>
                            <stop offset="1" stop-color="#845ef7"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h1>ZKSync Era</h1>
            </div>
            <div class="subtitle">Wallet Address</div>
        </div>

        <div class="divider"></div>

        <div class="network-row">
            <div class="network-info">
                <div class="network-dot"></div>
                <span class="network-name">ZKSync Era Mainnet</span>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Connected</span>
            </div>
        </div>

        <div class="address-section">
            <div class="section-label">Wallet Address</div>
            <div class="address-box">
                <div class="wallet-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/>
                        <path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/>
                        <path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>
                    </svg>
                </div>
                <div class="address-details">
                    <div class="address-label">Your Address</div>
                    <div class="address-value" id="walletAddress">0x0F1c3046F8398f805ca52eC6DdFE678ca286Dd05</div>
                </div>
                <button class="copy-btn" id="copyBtn" title="Copy address">
                    <svg id="copyIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                    <svg id="checkIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="footer">
            <p>View on <a href="https://explorer.zksync.io/address/0x0F1c3046F8398f805ca52eC6DdFE678ca286Dd05" target="_blank">ZKSync Explorer</a></p>
        </div>
    </div>

    <script>
        const copyBtn = document.getElementById('copyBtn');
        const copyIcon = document.getElementById('copyIcon');
        const checkIcon = document.getElementById('checkIcon');
        const walletAddress = document.getElementById('walletAddress').textContent;

        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(walletAddress);
                copyBtn.classList.add('copied');
                copyIcon.style.display = 'none';
                checkIcon.style.display = 'block';
                
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyIcon.style.display = 'block';
                    checkIcon.style.display = 'none';
                }, 2000);
            } catch (err) {
                const textArea = document.createElement('textarea');
                textArea.value = walletAddress;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
            }
        });

        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            particle.style.width = particle.style.height = (2 + Math.random() * 3) + 'px';
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
